<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SERTECSUR — Servicios Tecnológicos del Sureste. Cámaras CCTV, redes, alarmas y seguridad en Cd. del Carmen, Campeche." />
  <title>SERTECSUR — Servicios Tecnológicos del Sureste</title>
  <link rel="icon" type="image/svg" href="img/SVG/logo2Recurso 2.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="simulador.css" />
  <link rel="stylesheet" href="chat-popup.css" />
</head>
<body>

  <!-- Partials globales (header, sidebar, topbar) -->
  <div id="partial-topbar"></div>
  <div id="partial-header"></div>
  <div id="partial-sidebar"></div>

  <!-- Aquí se inyectan todas las vistas -->
  <div id="app">
    <div class="app-loading" id="appLoading">
      <div class="app-loading__spinner"></div>
      <p>Cargando…</p>
    </div>
  </div>

  <!-- Footer -->
  <div id="partial-footer"></div>

  <!-- Botón flotante WhatsApp / Chat -->
  <a
    class="whatsapp-float"
    href="https://wa.me/529381329935"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Contactar a SERTECSUR por WhatsApp"
  >
    <i class="fas fa-comment" aria-hidden="true"></i>
    <span>Necesitas Ayuda</span>
  </a>

  <!-- ── Panel Carrito ─────────────────── -->
  <div id="cartOverlay" style="
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.35);
    z-index:650; cursor:pointer;
  " onclick="Cart.close()"></div>

  <div id="cartPanel" style="
    position:fixed; top:0; right:-400px; width:380px; max-width:100vw; height:100%;
    background:#fff; z-index:700; display:flex; flex-direction:column;
    box-shadow:-4px 0 30px rgba(0,0,0,.12);
    transition:right .3s cubic-bezier(.34,1.1,.64,1);
  ">
    <div style="background:var(--clr-primary);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:.6rem;color:#fff;">
        <i class="fa-solid fa-cart-shopping" style="font-size:1.05rem;"></i>
        <span style="font-weight:700;font-size:.95rem;">Mi carrito</span>
      </div>
      <button onclick="Cart.close()" style="color:rgba(255,255,255,.75);font-size:1rem;padding:.3rem;border-radius:50%;background:none;border:none;cursor:pointer;">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div id="cartBody" style="flex:1;overflow-y:auto;padding:1rem;"></div>
    <div style="border-top:1px solid var(--clr-border);padding:1rem 1.25rem;flex-shrink:0;background:#fff;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;">
        <span style="font-weight:700;color:var(--clr-primary);">Total</span>
        <span id="cartTotal" style="font-size:1.1rem;font-weight:700;color:var(--clr-accent);">$0.00</span>
      </div>
      <a href="https://wa.me/529381329935?text=Hola!%20Quiero%20cotizar%20los%20productos%20de%20mi%20carrito"
         target="_blank" rel="noopener noreferrer"
         style="display:flex;align-items:center;justify-content:center;gap:.5rem;
                background:var(--clr-accent);color:#fff;padding:.65rem;border-radius:8px;
                font-size:.88rem;font-weight:700;text-decoration:none;font-family:var(--font-base);">
        <i class="fa-brands fa-whatsapp"></i> Solicitar cotización por WhatsApp
      </a>
    </div>
  </div>

  <style>
    #cartPanel.open { right: 0 !important; }
    #cartOverlay.open { display: block !important; }
  </style>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin="anonymous"></script>

  <script src="app.js"></script>
  <script src="loader.js"></script>
  <script src="simulador.js"></script>
  <script src="chat-popup.js"></script>

</body>
</html>
